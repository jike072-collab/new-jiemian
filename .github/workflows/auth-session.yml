name: Auth Session

on:
  pull_request:
    branches:
      - integration/auth-newapi
    paths:
      - "src/lib/server/auth/**"
      - "src/app/api/auth/**"
      - "src/lib/server/integrations/new-api/**"
      - "scripts/test-auth-session.mjs"
      - "tsconfig.auth-session-tests.json"
      - ".github/workflows/auth-session.yml"
  workflow_dispatch:

jobs:
  auth-session:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Auth session tests
        run: node scripts/test-auth-session.mjs

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
