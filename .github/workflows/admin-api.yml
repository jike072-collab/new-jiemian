name: Admin API

on:
  pull_request:
    branches:
      - integration/auth-newapi
    paths:
      - "src/lib/server/admin/**"
      - "src/app/api/admin/**"
      - "src/lib/server/auth/**"
      - "src/lib/server/billing/**"
      - "src/lib/server/quota/**"
      - "src/lib/server/integrations/new-api/**"
      - "scripts/test-admin-api.mjs"
      - "tsconfig.admin-api-tests.json"
      - ".github/workflows/admin-api.yml"
  workflow_dispatch:

jobs:
  admin-api:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Admin API tests
        run: node scripts/test-admin-api.mjs

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
