name: Application Database Migration

on:
  pull_request:
    branches:
      - integration/auth-newapi
      - develop
    paths:
      - db/**
      - scripts/database/**
      - src/lib/server/database/**
      - src/lib/server/auth/**
      - src/lib/server/billing/**
      - src/lib/server/integrations/new-api/**
      - tsconfig.auth-persistence-tests.json
      - tsconfig.billing-sandbox-tests.json
      - scripts/test-billing-sandbox.mjs
      - package.json
      - package-lock.json
      - .github/workflows/application-database.yml
      - .env.example
  workflow_dispatch:

jobs:
  application-database:
    name: PostgreSQL schema, migration, and bundle boundary
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: aohuang_app_test
          POSTGRES_USER: aohuang_app_test
          POSTGRES_PASSWORD: bootstrap-app-db-test-${{ github.run_id }}-${{ github.run_attempt }}
        ports:
          - 127.0.0.1:5432:5432
        options: >-
          --health-cmd "pg_isready -U aohuang_app_test -d aohuang_app_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify PostgreSQL localhost binding
        run: |
          set -eu
          CONTAINER_ID=$(docker ps --filter "ancestor=postgres:16-alpine" --format '{{.ID}}' | head -n 1)
          test -n "$CONTAINER_ID"
          PORT_BINDINGS=$(docker inspect "$CONTAINER_ID" --format '{{json .HostConfig.PortBindings}}')
          node -e '
            const bindings = JSON.parse(process.argv[1]);
            const entries = Object.values(bindings || {}).flat();
            if (entries.length === 0) {
              console.error("postgres service has no runtime port binding");
              process.exit(1);
            }
            for (const entry of entries) {
              if (entry.HostIp !== "127.0.0.1") {
                console.error(`postgres must bind only to 127.0.0.1, got ${entry.HostIp || "<empty>"}`);
                console.error(JSON.stringify(bindings));
                process.exit(1);
              }
            }
          ' "$PORT_BINDINGS"

      - name: Prepare random test database credential
        run: |
          set -eu
          BOOTSTRAP_PASSWORD="bootstrap-app-db-test-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          APP_DB_PASSWORD=$(openssl rand -hex 24)
          echo "::add-mask::$APP_DB_PASSWORD"
          docker run --rm --network host -e PGPASSWORD="$BOOTSTRAP_PASSWORD" postgres:16-alpine \
            psql -h 127.0.0.1 -U aohuang_app_test -d aohuang_app_test -v ON_ERROR_STOP=1 \
            -c "alter user aohuang_app_test with password '$APP_DB_PASSWORD';"
          {
            echo "APP_DATABASE_URL=postgresql://aohuang_app_test:$APP_DB_PASSWORD@127.0.0.1:5432/aohuang_app_test?sslmode=disable"
            echo "APP_DATABASE_EXPECTED_NAME=aohuang_app_test"
            echo "APP_DATABASE_MAX_CONNECTIONS=5"
            echo "APP_DATABASE_CONNECT_TIMEOUT_MS=5000"
            echo "APP_DATABASE_QUERY_TIMEOUT_MS=10000"
            echo "APP_DATABASE_IDLE_TIMEOUT_MS=30000"
            echo "NODE_ENV=test"
          } >> "$GITHUB_ENV"

      - name: Wrong database name fails before DDL
        run: |
          set -eu
          EXPECTED="$APP_DATABASE_EXPECTED_NAME"
          APP_DATABASE_EXPECTED_NAME=wrong_database_name
          export APP_DATABASE_EXPECTED_NAME
          if node scripts/database/migrate.mjs up > wrong-db.out 2> wrong-db.err; then
            echo "migration succeeded with wrong APP_DATABASE_EXPECTED_NAME" >&2
            exit 1
          fi
          if grep -E 'postgresql://|APP_DATABASE_URL|PASSWORD|password=' wrong-db.out wrong-db.err; then
            echo "wrong database failure leaked connection details" >&2
            exit 1
          fi
          if ! grep -q "unexpected application database" wrong-db.err; then
            echo "wrong database failure did not explain identity mismatch" >&2
            cat wrong-db.err >&2
            exit 1
          fi
          APP_DATABASE_EXPECTED_NAME="$EXPECTED"
          export APP_DATABASE_EXPECTED_NAME
          node <<'NODE'
          const pg = require("pg");
          (async () => {
            const pool = new pg.Pool({ connectionString: process.env.APP_DATABASE_URL });
            try {
              const result = await pool.query("select to_regclass('public.schema_migrations') as table_name");
              if (result.rows[0]?.table_name !== null) {
                console.error("schema_migrations exists after wrong database identity failure");
                process.exit(1);
              }
            } finally {
              await pool.end();
            }
          })().catch((error) => {
            console.error(error instanceof Error ? error.message : "schema_migrations absence check failed");
            process.exit(1);
          });
          NODE

      - name: Missing expected database name fails closed before DDL
        run: |
          set -eu
          EXPECTED="$APP_DATABASE_EXPECTED_NAME"
          unset APP_DATABASE_EXPECTED_NAME
          if node scripts/database/migrate.mjs up > missing-name.out 2> missing-name.err; then
            echo "migration succeeded without APP_DATABASE_EXPECTED_NAME" >&2
            exit 1
          fi
          if grep -E 'postgresql://|APP_DATABASE_URL|PASSWORD|password=' missing-name.out missing-name.err; then
            echo "missing expected name failure leaked connection details" >&2
            exit 1
          fi
          if ! grep -q "APP_DATABASE_EXPECTED_NAME is required" missing-name.err; then
            echo "missing expected name failure did not explain fail-closed config" >&2
            cat missing-name.err >&2
            exit 1
          fi
          APP_DATABASE_EXPECTED_NAME="$EXPECTED"
          export APP_DATABASE_EXPECTED_NAME
          node <<'NODE'
          const pg = require("pg");
          (async () => {
            const pool = new pg.Pool({ connectionString: process.env.APP_DATABASE_URL });
            try {
              const result = await pool.query("select to_regclass('public.schema_migrations') as table_name");
              if (result.rows[0]?.table_name !== null) {
                console.error("schema_migrations exists after missing expected name failure");
                process.exit(1);
              }
            } finally {
              await pool.end();
            }
          })().catch((error) => {
            console.error(error instanceof Error ? error.message : "schema_migrations absence check failed");
            process.exit(1);
          });
          NODE

      - name: Migration from empty database
        run: npm run migrate

      - name: Migration status
        run: npm run migrate:status

      - name: Migration status includes 001 through 003
        run: |
          set -eu
          npm run migrate:status > migration-status.txt
          grep -q $'001_initial_application_schema\tapplied' migration-status.txt
          grep -q $'002_harden_database_baseline\tapplied' migration-status.txt
          grep -q $'003_billing_webhook_processing_status\tapplied' migration-status.txt

      - name: Schema and transaction tests
        run: npm run migrate:test

      - name: Auth PostgreSQL persistence tests
        env:
          APP_AUTH_PERSISTENCE_MODE: postgres
        run: npm run test:auth-persistence

      - name: Auth migration dry run rejects bad source
        run: |
          set -eu
          mkdir -p .runtime/auth-migration-bad
          cat > .runtime/auth-migration-bad/auth-store.json <<'JSON'
          {
            "users": [],
            "sessions": [
              {
                "session_id": "not-a-uuid",
                "local_user_id": "missing-user",
                "token_hash": "raw-session-token",
                "session_version": 1,
                "created_at": "2026-06-18T00:00:00.000Z",
                "updated_at": "2026-06-18T00:00:00.000Z",
                "last_seen_at": "2026-06-18T00:00:00.000Z",
                "idle_expires_at": "2026-06-18T01:00:00.000Z",
                "expires_at": "2026-06-19T00:00:00.000Z",
                "revoked_at": null,
                "user_agent_hash": null,
                "ip_hash": null
              }
            ],
            "audit": []
          }
          JSON
          printf '[]\n' > .runtime/auth-migration-bad/new-api-user-mappings.json
          set +e
          APP_AUTH_MIGRATION_DATA_DIR=.runtime/auth-migration-bad npm run migrate:auth-data:dry-run > bad-auth-dry-run.json
          STATUS=$?
          set -e
          if [ "$STATUS" -ne 2 ]; then
            echo "bad auth migration dry-run should exit 2, got $STATUS" >&2
            cat bad-auth-dry-run.json >&2
            exit 1
          fi
          grep -q '"invalid_token_hash"' bad-auth-dry-run.json
          grep -q '"orphan_session"' bad-auth-dry-run.json
          if grep -E 'raw-session-token|APP_DATABASE_URL|postgresql://' bad-auth-dry-run.json; then
            echo "bad auth migration dry-run leaked sensitive source details" >&2
            exit 1
          fi

      - name: Auth migration dry-run apply idempotency verify
        run: |
          set -eu
          node <<'NODE'
          const pg = require("pg");
          (async () => {
            const pool = new pg.Pool({ connectionString: process.env.APP_DATABASE_URL });
            try {
              await pool.query("truncate table audit_events, new_api_user_mappings, auth_sessions, app_users restart identity cascade");
            } finally {
              await pool.end();
            }
          })().catch((error) => {
            console.error(error instanceof Error ? error.message : "auth migration state reset failed");
            process.exit(1);
          });
          NODE
          mkdir -p .runtime/auth-migration
          USER_ID="$(node -e 'console.log(crypto.randomUUID())')"
          SESSION_ID="$(node -e 'console.log(crypto.randomUUID())')"
          TOKEN_HASH="$(node -e 'console.log("c".repeat(64))')"
          PASSWORD_HASH='scrypt$v=1$n=16384$r=8$p=1$len=64$c2FsdA$0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef'
          cat > .runtime/auth-migration/auth-store.json <<JSON
          {
            "users": [
              {
                "local_user_id": "$USER_ID",
                "email": "ci-auth-migrate@example.com",
                "username": "ci-auth-migrate",
                "display_name": "CI Auth Migrate",
                "password_hash": "$PASSWORD_HASH",
                "status": "active",
                "role": "user",
                "session_version": 1,
                "created_at": "2026-06-18T00:00:00.000Z",
                "updated_at": "2026-06-18T00:00:00.000Z",
                "last_login_at": null
              }
            ],
            "sessions": [
              {
                "session_id": "$SESSION_ID",
                "local_user_id": "$USER_ID",
                "token_hash": "$TOKEN_HASH",
                "session_version": 1,
                "created_at": "2026-06-18T00:00:00.000Z",
                "updated_at": "2026-06-18T00:00:00.000Z",
                "last_seen_at": "2026-06-18T00:00:00.000Z",
                "idle_expires_at": "2026-06-18T01:00:00.000Z",
                "expires_at": "2026-06-19T00:00:00.000Z",
                "revoked_at": null,
                "user_agent_hash": null,
                "ip_hash": null
              }
            ],
            "audit": []
          }
          JSON
          cat > .runtime/auth-migration/new-api-user-mappings.json <<JSON
          [
            {
              "local_user_id": "$USER_ID",
              "new_api_user_id": "9001",
              "sync_status": "active",
              "created_at": "2026-06-18T00:00:00.000Z",
              "updated_at": "2026-06-18T00:00:00.000Z",
              "last_sync_at": "2026-06-18T00:00:00.000Z",
              "last_error_code": null,
              "last_error_message": null,
              "retry_count": 0,
              "version": 2,
              "idempotency_key": "register:$USER_ID"
            }
          ]
          JSON
          APP_AUTH_MIGRATION_DATA_DIR=.runtime/auth-migration npm run migrate:auth-data:dry-run > auth-dry-run.json
          APP_AUTH_MIGRATION_DATA_DIR=.runtime/auth-migration npm run migrate:auth-data:apply > auth-apply-1.json
          APP_AUTH_MIGRATION_DATA_DIR=.runtime/auth-migration npm run migrate:auth-data:apply > auth-apply-2.json
          APP_AUTH_MIGRATION_DATA_DIR=.runtime/auth-migration npm run migrate:auth-data:verify > auth-verify.json
          APP_AUTH_MIGRATION_DATA_DIR=.runtime/auth-migration npm run verify:auth-persistence > auth-consistency.json
          grep -q '"ok":true' auth-dry-run.json
          grep -q '"ok":true' auth-apply-1.json
          grep -q '"ok":true' auth-apply-2.json
          grep -q '"ok":true' auth-verify.json
          grep -q '"ok":true' auth-consistency.json
          if grep -E "$USER_ID|$SESSION_ID|$TOKEN_HASH|APP_DATABASE_URL|postgresql://" auth-*.json; then
            echo "auth migration output leaked raw ids, token hash, or database details" >&2
            exit 1
          fi

      - name: Auth postgres API contract with persistence mode
        env:
          APP_AUTH_PERSISTENCE_MODE: postgres
          AUTH_SESSION_SECRET: application-database-test-session-secret-not-production
          PAYMENT_SANDBOX_WEBHOOK_SECRET: application-database-test-webhook-secret-not-production
          NEW_API_ENABLED: "false"
        run: |
          npm run typecheck
          npm run build
          node scripts/database/bundle-scan.mjs

      - name: Billing postgres persistence and order query contract
        env:
          APP_BILLING_PERSISTENCE_MODE: postgres
          AUTH_SESSION_SECRET: application-database-test-session-secret-not-production
          PAYMENT_SANDBOX_WEBHOOK_SECRET: application-database-test-webhook-secret-not-production
          NEW_API_ENABLED: "false"
        run: node scripts/test-billing-sandbox.mjs

      - name: Re-run migration idempotently
        run: npm run migrate

      - name: Database health
        run: npm run db:health

      - name: Server-only database boundary
        run: npm run database:boundary

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          AUTH_SESSION_SECRET: application-database-test-session-secret-not-production
          PAYMENT_SANDBOX_WEBHOOK_SECRET: application-database-test-webhook-secret-not-production
          NEW_API_ENABLED: "false"
        run: npm run build

      - name: Client bundle database scan
        run: node scripts/database/bundle-scan.mjs

      - name: Secret pattern scan
        run: |
          set -eu
          PATTERN='[-]{5}BEGIN (RSA |DSA |EC |OPENSSH |PGP )?PRIVATE KEY[-]{5}|ghp_[A-Za-z0-9_]{30,}|github_pat_[A-Za-z0-9_]{50,}|AKIA[0-9A-Z]{16}|sk-[A-Za-z0-9]{32,}'
          set +e
          git grep -n -I -E -e "$PATTERN" -- ':!package-lock.json' > secret-scan.txt
          STATUS=$?
          set -e

          if [ "$STATUS" -eq 0 ]; then
            cat secret-scan.txt >&2
            echo "potential secret pattern found" >&2
            exit 1
          fi

          if [ "$STATUS" -ne 1 ]; then
            echo "git grep failed with status $STATUS" >&2
            exit "$STATUS"
          fi

      - name: Pull request diff sensitive scan
        run: |
          set -eu
          PATTERN='[-]{5}BEGIN (RSA |DSA |EC |OPENSSH |PGP )?PRIVATE KEY[-]{5}|ghp_[A-Za-z0-9_]{30,}|github_pat_[A-Za-z0-9_]{50,}|AKIA[0-9A-Z]{16}|sk-[A-Za-z0-9]{32,}'
          BASE_REF="${GITHUB_BASE_REF:-integration/auth-newapi}"
          git fetch origin "$BASE_REF" --depth=1
          git diff --unified=0 "origin/$BASE_REF...HEAD" > pr.diff
          if grep -n -E -- "$PATTERN" pr.diff; then
            echo "sensitive pattern found in pull request diff" >&2
            exit 1
          fi

      - name: Verify no direct New API database table or DSN access
        run: |
          set -eu
          set +e
          git grep -n -I -E -e 'SQL_DSN|REDIS_CONN_STRING|new_api_(users|sessions|tokens|channels|models|logs|tasks|orders|payments|settings|statistics|limits|usage|audit|billing|roles|permissions)' -- db src/lib/server/database src/lib/server/auth src/lib/server/integrations/new-api > forbidden-new-api-db.txt
          STATUS=$?
          set -e

          if [ "$STATUS" -eq 0 ]; then
            cat forbidden-new-api-db.txt >&2
            echo "application database baseline must not access New API internal database tables or DSNs" >&2
            exit 1
          fi

          if [ "$STATUS" -ne 1 ]; then
            echo "git grep failed with status $STATUS" >&2
            exit "$STATUS"
          fi

      - name: npm audit record
        run: |
          set -eu
          set +e
          npm audit --json > npm-audit.json
          STATUS=$?
          set -e
          if [ "$STATUS" -ne 0 ] && [ "$STATUS" -ne 1 ]; then
            echo "npm audit failed with status $STATUS" >&2
            exit "$STATUS"
          fi
          node <<'NODE'
          const fs = require("node:fs");
          const audit = JSON.parse(fs.readFileSync("npm-audit.json", "utf8") || "{}");
          const vulnerabilities = audit.metadata?.vulnerabilities || {};
          const summary = {
            info: vulnerabilities.info || 0,
            low: vulnerabilities.low || 0,
            moderate: vulnerabilities.moderate || 0,
            high: vulnerabilities.high || 0,
            critical: vulnerabilities.critical || 0,
            total: vulnerabilities.total || 0,
          };
          console.log(`npm audit summary: ${JSON.stringify(summary)}`);
          if (summary.high > 0 || summary.critical > 0) {
            console.log("production release blocker: high or critical npm audit findings remain unresolved");
          }
          NODE

      - name: Cleanup test database
        if: always()
        run: |
          set -eu
          if [ -n "${APP_DATABASE_URL:-}" ]; then
            docker run --rm --network host -e PGPASSWORD="$(printf '%s' "$APP_DATABASE_URL" | sed -E 's#^postgresql://[^:]+:([^@]+)@.*$#\1#')" postgres:16-alpine \
              psql -h 127.0.0.1 -U aohuang_app_test -d aohuang_app_test -v ON_ERROR_STOP=1 \
              -c "drop schema if exists public cascade;" \
              -c "create schema public;"
          fi
