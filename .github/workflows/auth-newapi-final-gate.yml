name: Auth New API Final Gate

on:
  pull_request:
    branches:
      - develop
      - integration/auth-newapi
  workflow_dispatch:

jobs:
  static-quality:
    name: Typecheck, lint, build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  auth-session:
    name: Auth and session tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Auth session tests
        run: node scripts/test-auth-session.mjs

  bff-user-mapping:
    name: BFF and user mapping tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: BFF and mapping tests
        run: node scripts/test-new-api-bff.mjs

  quota-usage:
    name: Quota and usage tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Quota and usage tests
        run: node scripts/test-quota-usage.mjs

  billing-webhook:
    name: Billing, webhook, reconciliation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Billing sandbox tests
        run: node scripts/test-billing-sandbox.mjs

      - name: Billing reconciliation dry run
        run: node scripts/reconcile-billing-sandbox.mjs --dry-run --json

  new-api-docker-health:
    name: New API Docker health and real BFF
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare New API environment
        working-directory: infra/new-api
        run: |
          set -eu
          POSTGRES_PASSWORD=$(openssl rand -hex 18)
          REDIS_PASSWORD=$(openssl rand -hex 18)
          SESSION_SECRET=$(openssl rand -hex 32)
          CRYPTO_SECRET=$(openssl rand -hex 32)
          ADMIN_PASSWORD=$(openssl rand -hex 18)
          echo "::add-mask::$POSTGRES_PASSWORD"
          echo "::add-mask::$REDIS_PASSWORD"
          echo "::add-mask::$SESSION_SECRET"
          echo "::add-mask::$CRYPTO_SECRET"
          echo "::add-mask::$ADMIN_PASSWORD"
          {
            echo "ADMIN_PASSWORD=$ADMIN_PASSWORD"
          } >> "$GITHUB_ENV"
          cat > .env <<'ENV'
          NEW_API_IMAGE=calciumion/new-api:v1.0.0-rc.11@sha256:bd30213d808857bb569ef47d3c9209d061a66ea089c2472ef46ce51e75517f19
          NEW_API_BIND_ADDRESS=127.0.0.1
          NEW_API_PORT=3000
          PORT=3000
          TZ=Asia/Shanghai
          NODE_TYPE=master
          NODE_NAME=new-api-final-gate-health
          LOG_LEVEL=info
          ERROR_LOG_ENABLED=true
          BATCH_UPDATE_ENABLED=true
          POSTGRES_DB=new_api_test
          POSTGRES_USER=new_api_test
          POSTGRES_PASSWORD=__POSTGRES_PASSWORD__
          SQL_DSN=postgresql://new_api_test:__POSTGRES_PASSWORD__@postgres:5432/new_api_test?sslmode=disable
          REDIS_PASSWORD=__REDIS_PASSWORD__
          REDIS_CONN_STRING=redis://:__REDIS_PASSWORD__@redis:6379/0
          SESSION_SECRET=__SESSION_SECRET__
          CRYPTO_SECRET=__CRYPTO_SECRET__
          ADMIN_USERNAME=testroot
          ADMIN_PASSWORD=__ADMIN_PASSWORD__
          ADMIN_CONFIRM_PASSWORD=__ADMIN_PASSWORD__
          ADMIN_SELF_USE_MODE_ENABLED=true
          ADMIN_DEMO_SITE_ENABLED=false
          ENV
          sed -i \
            -e "s#__POSTGRES_PASSWORD__#$POSTGRES_PASSWORD#g" \
            -e "s#__REDIS_PASSWORD__#$REDIS_PASSWORD#g" \
            -e "s#__SESSION_SECRET__#$SESSION_SECRET#g" \
            -e "s#__CRYPTO_SECRET__#$CRYPTO_SECRET#g" \
            -e "s#__ADMIN_PASSWORD__#$ADMIN_PASSWORD#g" \
            .env
          mkdir -p .runtime/new-api/data .runtime/new-api/logs .runtime/new-api/postgres .runtime/new-api/redis

      - name: Start New API stack
        working-directory: infra/new-api
        run: |
          set -eu
          scripts/preflight
          scripts/start
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:3000/api/status >/dev/null; then
              exit 0
            fi
            sleep 5
          done
          docker compose logs --tail=200
          exit 1

      - name: Healthcheck
        working-directory: infra/new-api
        run: scripts/healthcheck

      - name: Verify database and Redis are not public
        working-directory: infra/new-api
        run: |
          set -eu
          docker compose ps
          if docker compose port postgres 5432 > postgres-port.txt 2>/dev/null; then
            if [ -s postgres-port.txt ]; then
              echo "PostgreSQL exposes a host port" >&2
              cat postgres-port.txt >&2
              exit 1
            fi
          fi
          if docker compose port redis 6379 > redis-port.txt 2>/dev/null; then
            if [ -s redis-port.txt ]; then
              echo "Redis exposes a host port" >&2
              cat redis-port.txt >&2
              exit 1
            fi
          fi

      - name: Initialize test admin
        working-directory: infra/new-api
        run: |
          set -eu
          curl -fsS http://127.0.0.1:3000/api/setup \
            -H "Content-Type: application/json" \
            --data-raw '{
              "username": "testroot",
              "password": "'"$ADMIN_PASSWORD"'",
              "confirmPassword": "'"$ADMIN_PASSWORD"'",
              "SelfUseModeEnabled": true,
              "DemoSiteEnabled": false
            }' > setup-response.json
          grep -q '"success":true' setup-response.json

      - name: Generate admin access token
        run: |
          set -eu
          curl -fsS -c new-api.cookies http://127.0.0.1:3000/api/user/login \
            -H "Content-Type: application/json" \
            --data-raw '{"username":"testroot","password":"'"$ADMIN_PASSWORD"'"}' \
            > login-response.json
          grep -q '"success":true' login-response.json
          ADMIN_TOKEN=$(curl -fsS -b new-api.cookies http://127.0.0.1:3000/api/user/token -H "New-Api-User: 1" | node -e "let data=''; process.stdin.on('data', c => data += c); process.stdin.on('end', () => { const parsed = JSON.parse(data); if (!parsed.success || !parsed.data) process.exit(1); console.log(parsed.data); });")
          echo "::add-mask::$ADMIN_TOKEN"
          {
            echo "NEW_API_ENABLED=true"
            echo "NEW_API_BASE_URL=http://127.0.0.1:3000"
            echo "NEW_API_ADMIN_USER_ID=1"
            echo "NEW_API_ADMIN_ACCESS_TOKEN=$ADMIN_TOKEN"
          } >> "$GITHUB_ENV"

      - name: Real BFF and mapping verification
        run: node scripts/test-new-api-bff.mjs --real

      - name: Redacted log scan
        working-directory: infra/new-api
        run: |
          set -eu
          scripts/redact-logs --input .env --output env.redacted.log
          if grep -E '(POSTGRES_PASSWORD|REDIS_PASSWORD|SESSION_SECRET|CRYPTO_SECRET|ADMIN_PASSWORD)=[^[]' env.redacted.log; then
            echo "redacted log still contains secret values" >&2
            exit 1
          fi

      - name: Stop New API stack
        if: always()
        working-directory: infra/new-api
        run: docker compose down --remove-orphans

  backup-restore:
    name: Backup, restore, bad backup rejection
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare New API environment
        working-directory: infra/new-api
        run: |
          set -eu
          POSTGRES_PASSWORD=$(openssl rand -hex 18)
          REDIS_PASSWORD=$(openssl rand -hex 18)
          SESSION_SECRET=$(openssl rand -hex 32)
          CRYPTO_SECRET=$(openssl rand -hex 32)
          ADMIN_PASSWORD=$(openssl rand -hex 18)
          echo "::add-mask::$POSTGRES_PASSWORD"
          echo "::add-mask::$REDIS_PASSWORD"
          echo "::add-mask::$SESSION_SECRET"
          echo "::add-mask::$CRYPTO_SECRET"
          echo "::add-mask::$ADMIN_PASSWORD"
          {
            echo "ADMIN_PASSWORD=$ADMIN_PASSWORD"
          } >> "$GITHUB_ENV"
          cat > .env <<'ENV'
          NEW_API_IMAGE=calciumion/new-api:v1.0.0-rc.11@sha256:bd30213d808857bb569ef47d3c9209d061a66ea089c2472ef46ce51e75517f19
          NEW_API_BIND_ADDRESS=127.0.0.1
          NEW_API_PORT=3000
          PORT=3000
          TZ=Asia/Shanghai
          NODE_TYPE=master
          NODE_NAME=new-api-final-gate-backup
          LOG_LEVEL=info
          ERROR_LOG_ENABLED=true
          BATCH_UPDATE_ENABLED=true
          POSTGRES_DB=new_api_test
          POSTGRES_USER=new_api_test
          POSTGRES_PASSWORD=__POSTGRES_PASSWORD__
          SQL_DSN=postgresql://new_api_test:__POSTGRES_PASSWORD__@postgres:5432/new_api_test?sslmode=disable
          REDIS_PASSWORD=__REDIS_PASSWORD__
          REDIS_CONN_STRING=redis://:__REDIS_PASSWORD__@redis:6379/0
          SESSION_SECRET=__SESSION_SECRET__
          CRYPTO_SECRET=__CRYPTO_SECRET__
          ADMIN_USERNAME=testroot
          ADMIN_PASSWORD=__ADMIN_PASSWORD__
          ADMIN_CONFIRM_PASSWORD=__ADMIN_PASSWORD__
          ADMIN_SELF_USE_MODE_ENABLED=true
          ADMIN_DEMO_SITE_ENABLED=false
          ENV
          sed -i \
            -e "s#__POSTGRES_PASSWORD__#$POSTGRES_PASSWORD#g" \
            -e "s#__REDIS_PASSWORD__#$REDIS_PASSWORD#g" \
            -e "s#__SESSION_SECRET__#$SESSION_SECRET#g" \
            -e "s#__CRYPTO_SECRET__#$CRYPTO_SECRET#g" \
            -e "s#__ADMIN_PASSWORD__#$ADMIN_PASSWORD#g" \
            .env
          mkdir -p .runtime/new-api/data .runtime/new-api/logs .runtime/new-api/postgres .runtime/new-api/redis

      - name: Start New API stack
        working-directory: infra/new-api
        run: |
          set -eu
          scripts/preflight
          scripts/start
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:3000/api/status >/dev/null; then
              exit 0
            fi
            sleep 5
          done
          docker compose logs --tail=200
          exit 1

      - name: Initialize and verify admin login
        working-directory: infra/new-api
        run: |
          set -eu
          curl -fsS http://127.0.0.1:3000/api/setup \
            -H "Content-Type: application/json" \
            --data-raw '{
              "username": "testroot",
              "password": "'"$ADMIN_PASSWORD"'",
              "confirmPassword": "'"$ADMIN_PASSWORD"'",
              "SelfUseModeEnabled": true,
              "DemoSiteEnabled": false
            }' > setup-response.json
          grep -q '"success":true' setup-response.json
          curl -fsS http://127.0.0.1:3000/api/user/login \
            -H "Content-Type: application/json" \
            --data-raw '{"username":"testroot","password":"'"$ADMIN_PASSWORD"'"}' \
            > login-response.json
          grep -q '"success":true' login-response.json

      - name: Seed restore marker
        working-directory: infra/new-api
        run: |
          set -eu
          docker compose exec -T postgres psql -U new_api_test -d new_api_test -v ON_ERROR_STOP=1 \
            -c "create table if not exists ops_restore_marker (id int primary key, value text not null);" \
            -c "insert into ops_restore_marker (id, value) values (1, 'before-restore') on conflict (id) do update set value = excluded.value;"

      - name: Backup
        working-directory: infra/new-api
        run: |
          set -eu
          BACKUP_DIR=$(scripts/backup)
          echo "BACKUP_DIR=$BACKUP_DIR" >> "$GITHUB_ENV"
          test -f "$BACKUP_DIR/postgres.sql.gz"
          test -f "$BACKUP_DIR/runtime.tar.gz"
          test -f "$BACKUP_DIR/checksums.sha256"
          grep -q "REDACTED" "$BACKUP_DIR/env.redacted"

      - name: Mutate and restore
        working-directory: infra/new-api
        run: |
          set -eu
          docker compose exec -T postgres psql -U new_api_test -d new_api_test -v ON_ERROR_STOP=1 \
            -c "update ops_restore_marker set value = 'after-backup' where id = 1;"
          scripts/restore --backup "$BACKUP_DIR" --confirm RESTORE_NEW_API_TEST
          VALUE=$(docker compose exec -T postgres psql -U new_api_test -d new_api_test -tA -c "select value from ops_restore_marker where id = 1;")
          test "$VALUE" = "before-restore"

      - name: Verify login after restore
        working-directory: infra/new-api
        run: |
          set -eu
          curl -fsS http://127.0.0.1:3000/api/user/login \
            -H "Content-Type: application/json" \
            --data-raw '{"username":"testroot","password":"'"$ADMIN_PASSWORD"'"}' \
            > login-after-restore.json
          grep -q '"success":true' login-after-restore.json

      - name: Reject bad backup
        working-directory: infra/new-api
        run: |
          set -eu
          mkdir -p backups/bad-backup
          if scripts/restore --backup backups/bad-backup --confirm RESTORE_NEW_API_TEST; then
            echo "bad backup was accepted" >&2
            exit 1
          fi

      - name: Stop New API stack
        if: always()
        working-directory: infra/new-api
        run: docker compose down --remove-orphans

  security-scans:
    name: Server secrets, client bundle, diff scan
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Tracked runtime file scan
        run: |
          set -eu
          if git ls-files | grep -E '(^|/)\.env$|(^|/)\.next/|(^|/)data/|auth-store\.json|billing-store\.json|quota-usage-log\.json|\.sqlite$|\.db$|\.sqlite3$'; then
            echo "tracked runtime, database, or environment file found" >&2
            exit 1
          fi

      - name: Server secret pattern scan
        run: |
          set -eu
          git grep -n -I -E '-----BEGIN (RSA |DSA |EC |OPENSSH |PGP )?PRIVATE KEY-----|ghp_[A-Za-z0-9_]{30,}|github_pat_[A-Za-z0-9_]{50,}|AKIA[0-9A-Z]{16}|sk-[A-Za-z0-9]{32,}' -- ':!package-lock.json' > secret-scan.txt
          if [ -s secret-scan.txt ]; then
            cat secret-scan.txt >&2
            exit 1
          fi

      - name: Git diff sensitive scan
        run: |
          set -eu
          BASE_REF="${GITHUB_BASE_REF:-develop}"
          git fetch origin "$BASE_REF" --depth=1
          git diff --unified=0 "origin/$BASE_REF...HEAD" > pr.diff
          if grep -n -E '-----BEGIN (RSA |DSA |EC |OPENSSH |PGP )?PRIVATE KEY-----|ghp_[A-Za-z0-9_]{30,}|github_pat_[A-Za-z0-9_]{50,}|AKIA[0-9A-Z]{16}|sk-[A-Za-z0-9]{32,}' pr.diff; then
            echo "sensitive pattern found in pull request diff" >&2
            exit 1
          fi

      - name: Build for bundle scan
        env:
          AUTH_SESSION_SECRET: final-gate-test-session-secret-not-production
          PAYMENT_SANDBOX_WEBHOOK_SECRET: final-gate-test-webhook-secret-not-production
          NEW_API_ENABLED: "false"
        run: npm run build

      - name: Client bundle leak scan
        run: |
          set -eu
          if grep -R -n -I -E 'NEW_API_ADMIN_ACCESS_TOKEN|NEW_API_ADMIN_USER_ID|PAYMENT_SANDBOX_WEBHOOK_SECRET|AUTH_SESSION_SECRET|SESSION_SECRET|CRYPTO_SECRET|SQL_DSN|REDIS_CONN_STRING|admin-secret' .next/static; then
            echo "server secret marker leaked into client static bundle" >&2
            exit 1
          fi

      - name: npm audit record
        run: npm audit --audit-level=moderate
