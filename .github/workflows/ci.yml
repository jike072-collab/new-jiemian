name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: rollback_drill
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d rollback_drill"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Runtime isolation tests
        run: npm run test:runtime-isolation

      - name: Runtime path usage check
        run: npm run check:runtime-paths

      - name: Security release tests
        run: npm run test:security-release

      - name: Studio API contracts
        run: npm run check:studio-api-contracts

      - name: Stage 3 Studio regression logic
        run: npm run test:stage3-studio-regression -- --skip-runtime

      - name: Stage 4 provider health
        run: npm run test:stage4-provider-health

      - name: Stage 8A provider health
        run: npm run test:provider-health

      - name: Release artifact cleanliness
        run: npm run test:release-artifact-cleanliness

      - name: Stage 5 error diagnostics
        run: npm run test:stage5-error-diagnostics

      - name: Log redaction
        run: npm run test:log-redaction

      - name: Upscale auth CSRF
        run: npm run test:upscale-auth-csrf

      - name: Network hardening dry-run
        run: npm run test:network-hardening-dry-run

      - name: Database implementation gate
        run: npm run check:database-gate

      - name: Stage 9C-A database MVP schema
        run: npm run db:schema:check

      - name: Stage 9C-A database MVP migration check
        run: npm run db:migrate:check
        env:
          STAGE9C_TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/rollback_drill
          STAGE9C_TEST_DATABASE_EXPECTED_NAME: rollback_drill

      - name: Stage 9C-A database MVP repositories
        run: npm run test:database-mvp
        env:
          STAGE9C_TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/rollback_drill
          STAGE9C_TEST_DATABASE_EXPECTED_NAME: rollback_drill

      - name: Stage 9C-B database library integration
        run: npm run test:database-library-integration

      - name: Stage 9C-B generation jobs database integration
        run: npm run test:generation-jobs-db-integration

      - name: Stage 9C-B library import dry-run
        run: npm run db:library-import:plan

      - name: Stage 9C-B library consistency check
        run: npm run db:library-consistency:check

      - name: Stage 9D migration rehearsal
        run: npm run db:migration:rehearsal
        env:
          STAGE9D_REHEARSAL_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/rollback_drill
          STAGE9D_REHEARSAL_EXPECTED_NAME: rollback_drill

      - name: Stage 9D import dry-run
        run: npm run db:import:dry-run

      - name: Stage 9D DB/file consistency
        run: npm run db:consistency:check

      - name: Stage 9D rollback readiness
        run: npm run db:rollback:check

      - name: Release test artifact isolation
        run: npm run check:release-test-artifact-isolation

      - name: Operations service tests
        run: npm run test:ops

      - name: Full rollback drill
        run: npm run test:rollback-drill
        env:
          ROLLBACK_DRILL_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/rollback_drill
          ROLLBACK_DRILL_EXPECTED_DATABASE_NAME: rollback_drill

      - name: Build
        run: npm run build

      - name: Install Nginx
        run: sudo apt-get update && sudo apt-get install -y nginx openssl

      - name: Nginx template syntax check
        run: |
          mkdir -p .tmp/nginx-test/conf.d .tmp/nginx-test/certs .tmp/nginx-test/www
          openssl req -x509 -nodes -newkey rsa:2048 -days 1 \
            -keyout .tmp/nginx-test/certs/key.pem \
            -out .tmp/nginx-test/certs/cert.pem \
            -subj "/CN=aohuang.example.com"
          sed "s#/etc/letsencrypt/live/aohuang.example.com/fullchain.pem#$(pwd)/.tmp/nginx-test/certs/cert.pem#g; s#/etc/letsencrypt/live/aohuang.example.com/privkey.pem#$(pwd)/.tmp/nginx-test/certs/key.pem#g" deploy/linux/nginx-site.conf.example > .tmp/nginx-test/site.conf
          cat > .tmp/nginx-test/nginx.conf <<'EOF'
          events {}
          http {
              include mime.types;
              default_type application/octet-stream;
              include __ROOT__/deploy/linux/nginx-limits.conf.example;
              include __ROOT__/.tmp/nginx-test/site.conf;
          }
          EOF
          sed -i "s#__ROOT__#$(pwd)#g" .tmp/nginx-test/nginx.conf
          nginx -t -p "$(pwd)/.tmp/nginx-test" -c "$(pwd)/.tmp/nginx-test/nginx.conf"

      - name: Staging smoke
        run: npm run test:staging-smoke
        env:
          STAGING_SMOKE_PORT: 43107

      - name: Stage 2 UI acceptance
        run: npm run test:stage2-ui-acceptance
        env:
          STUDIO_TEST_MANAGE_SERVER: "1"
          STUDIO_TEST_PORT: 43108

      - name: Stage 3 Studio regression runtime
        run: npm run test:stage3-studio-regression
        env:
          STUDIO_TEST_MANAGE_SERVER: "1"
          STUDIO_TEST_PORT: 43109

  windows-quality:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Runtime isolation tests
        run: npm run test:runtime-isolation

      - name: Runtime path usage check
        run: npm run check:runtime-paths

      - name: Security release tests
        run: npm run test:security-release

      - name: Studio API contracts
        run: npm run check:studio-api-contracts

      - name: Stage 3 Studio regression logic
        run: npm run test:stage3-studio-regression -- --skip-runtime

      - name: Stage 4 provider health
        run: npm run test:stage4-provider-health

      - name: Stage 8A provider health
        run: npm run test:provider-health

      - name: Release artifact cleanliness
        run: npm run test:release-artifact-cleanliness

      - name: Stage 5 error diagnostics
        run: npm run test:stage5-error-diagnostics

      - name: Log redaction
        run: npm run test:log-redaction

      - name: Upscale auth CSRF
        run: npm run test:upscale-auth-csrf

      - name: Network hardening dry-run
        run: npm run test:network-hardening-dry-run

      - name: Database implementation gate
        run: npm run check:database-gate

      - name: Stage 9C-A database MVP schema
        run: npm run db:schema:check

      - name: Stage 9C-A database MVP migration check
        run: npm run db:migrate:check

      - name: Stage 9C-A database MVP repositories
        run: npm run test:database-mvp

      - name: Stage 9C-B database library integration
        run: npm run test:database-library-integration

      - name: Stage 9C-B generation jobs database integration
        run: npm run test:generation-jobs-db-integration

      - name: Stage 9C-B library import dry-run
        run: npm run db:library-import:plan

      - name: Stage 9C-B library consistency check
        run: npm run db:library-consistency:check

      - name: Stage 9D migration rehearsal
        run: npm run db:migration:rehearsal

      - name: Stage 9D import dry-run
        run: npm run db:import:dry-run

      - name: Stage 9D DB/file consistency
        run: npm run db:consistency:check

      - name: Stage 9D rollback readiness
        run: npm run db:rollback:check

      - name: Release test artifact isolation
        run: npm run check:release-test-artifact-isolation

      - name: Operations service tests
        run: npm run test:ops

      - name: Full rollback drill
        run: npm run test:rollback-drill

      - name: Build
        run: npm run build
