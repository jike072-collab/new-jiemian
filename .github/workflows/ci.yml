name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: rollback_drill
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d rollback_drill"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Runtime isolation tests
        run: npm run test:runtime-isolation

      - name: Runtime path usage check
        run: npm run check:runtime-paths

      - name: Security release tests
        run: npm run test:security-release

      - name: Operations service tests
        run: npm run test:ops

      - name: Full rollback drill
        run: npm run test:rollback-drill
        env:
          ROLLBACK_DRILL_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/rollback_drill

      - name: Build
        run: npm run build

      - name: Staging smoke
        run: npm run test:staging-smoke
        env:
          STAGING_SMOKE_PORT: 43107

  windows-quality:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Runtime isolation tests
        run: npm run test:runtime-isolation

      - name: Runtime path usage check
        run: npm run check:runtime-paths

      - name: Security release tests
        run: npm run test:security-release

      - name: Operations service tests
        run: npm run test:ops

      - name: Full rollback drill
        run: npm run test:rollback-drill

      - name: Build
        run: npm run build
