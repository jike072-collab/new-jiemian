name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Runtime isolation tests
        run: npm run test:runtime-isolation

      - name: Runtime path usage check
        run: npm run check:runtime-paths

      - name: Security release tests
        run: npm run test:security-release

      - name: Operations service tests
        run: npm run test:ops

      - name: Build
        run: npm run build

      - name: Staging smoke
        run: npm run test:staging-smoke
        env:
          STAGING_SMOKE_PORT: 43107
