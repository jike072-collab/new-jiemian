name: New API Ops

on:
  pull_request:
    branches:
      - integration/auth-newapi
    paths:
      - "infra/new-api/**"
      - ".github/workflows/new-api-ops.yml"
  workflow_dispatch:

jobs:
  operations:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate scripts
        run: |
          for script in infra/new-api/scripts/*; do
            sh -n "$script"
          done

      - name: Prepare environment
        working-directory: infra/new-api
        run: |
          POSTGRES_PASSWORD=$(openssl rand -hex 18)
          REDIS_PASSWORD=$(openssl rand -hex 18)
          SESSION_SECRET=$(openssl rand -hex 32)
          CRYPTO_SECRET=$(openssl rand -hex 32)
          ADMIN_PASSWORD=$(openssl rand -hex 18)
          echo "::add-mask::$POSTGRES_PASSWORD"
          echo "::add-mask::$REDIS_PASSWORD"
          echo "::add-mask::$SESSION_SECRET"
          echo "::add-mask::$CRYPTO_SECRET"
          echo "::add-mask::$ADMIN_PASSWORD"
          {
            echo "ADMIN_PASSWORD=$ADMIN_PASSWORD"
          } >> "$GITHUB_ENV"
          cat > .env <<'ENV'
          NEW_API_IMAGE=calciumion/new-api:v1.0.0-rc.11@sha256:bd30213d808857bb569ef47d3c9209d061a66ea089c2472ef46ce51e75517f19
          NEW_API_BIND_ADDRESS=127.0.0.1
          NEW_API_PORT=3000
          PORT=3000
          TZ=Asia/Shanghai
          NODE_TYPE=master
          NODE_NAME=new-api-ci-ops
          LOG_LEVEL=info
          ERROR_LOG_ENABLED=true
          BATCH_UPDATE_ENABLED=true
          POSTGRES_DB=new_api_test
          POSTGRES_USER=new_api_test
          POSTGRES_PASSWORD=__POSTGRES_PASSWORD__
          SQL_DSN=postgresql://new_api_test:__POSTGRES_PASSWORD__@postgres:5432/new_api_test?sslmode=disable
          REDIS_PASSWORD=__REDIS_PASSWORD__
          REDIS_CONN_STRING=redis://:__REDIS_PASSWORD__@redis:6379/0
          SESSION_SECRET=__SESSION_SECRET__
          CRYPTO_SECRET=__CRYPTO_SECRET__
          ADMIN_USERNAME=testroot
          ADMIN_PASSWORD=__ADMIN_PASSWORD__
          ADMIN_CONFIRM_PASSWORD=__ADMIN_PASSWORD__
          ADMIN_SELF_USE_MODE_ENABLED=true
          ADMIN_DEMO_SITE_ENABLED=false
          ENV
          sed -i \
            -e "s#__POSTGRES_PASSWORD__#$POSTGRES_PASSWORD#g" \
            -e "s#__REDIS_PASSWORD__#$REDIS_PASSWORD#g" \
            -e "s#__SESSION_SECRET__#$SESSION_SECRET#g" \
            -e "s#__CRYPTO_SECRET__#$CRYPTO_SECRET#g" \
            -e "s#__ADMIN_PASSWORD__#$ADMIN_PASSWORD#g" \
            .env
          mkdir -p .runtime/new-api/data .runtime/new-api/logs .runtime/new-api/postgres .runtime/new-api/redis

      - name: Preflight
        working-directory: infra/new-api
        run: scripts/preflight

      - name: Start stack
        working-directory: infra/new-api
        run: scripts/start

      - name: Wait for status
        working-directory: infra/new-api
        run: |
          docker compose ps
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:3000/api/status >/dev/null; then
              exit 0
            fi
            sleep 5
          done
          docker compose logs --tail=200
          exit 1

      - name: Healthcheck
        working-directory: infra/new-api
        run: scripts/healthcheck

      - name: Initialize test admin
        working-directory: infra/new-api
        run: |
          curl -fsS http://127.0.0.1:3000/api/setup \
            -H "Content-Type: application/json" \
            --data-raw '{
              "username": "testroot",
              "password": "'"$ADMIN_PASSWORD"'",
              "confirmPassword": "'"$ADMIN_PASSWORD"'",
              "SelfUseModeEnabled": true,
              "DemoSiteEnabled": false
            }' > setup-response.json
          grep -q '"success":true' setup-response.json

      - name: Verify login
        working-directory: infra/new-api
        run: |
          curl -fsS http://127.0.0.1:3000/api/user/login \
            -H "Content-Type: application/json" \
            --data-raw '{"username":"testroot","password":"'"$ADMIN_PASSWORD"'"}' \
            > login-response.json
          grep -q '"success":true' login-response.json

      - name: Seed restore marker
        working-directory: infra/new-api
        run: |
          docker compose exec -T postgres psql -U new_api_test -d new_api_test -v ON_ERROR_STOP=1 \
            -c "create table if not exists ops_restore_marker (id int primary key, value text not null);" \
            -c "insert into ops_restore_marker (id, value) values (1, 'before-restore') on conflict (id) do update set value = excluded.value;"

      - name: Backup
        working-directory: infra/new-api
        run: |
          BACKUP_DIR=$(scripts/backup)
          echo "BACKUP_DIR=$BACKUP_DIR" >> "$GITHUB_ENV"
          test -f "$BACKUP_DIR/postgres.sql.gz"
          test -f "$BACKUP_DIR/checksums.sha256"
          grep -q "REDACTED" "$BACKUP_DIR/env.redacted"

      - name: Upgrade check and rollback dry-run
        working-directory: infra/new-api
        run: |
          TARGET_IMAGE=$(awk -F= '$1 == "NEW_API_IMAGE" {print substr($0, index($0, "=") + 1)}' .env | tail -n 1)
          scripts/upgrade-check --target-image "$TARGET_IMAGE"
          scripts/rollback --backup "$BACKUP_DIR" --previous-image "$TARGET_IMAGE" --dry-run

      - name: Mutate marker and restore
        working-directory: infra/new-api
        run: |
          docker compose exec -T postgres psql -U new_api_test -d new_api_test -v ON_ERROR_STOP=1 \
            -c "update ops_restore_marker set value = 'after-backup' where id = 1;"
          scripts/restore --backup "$BACKUP_DIR" --confirm RESTORE_NEW_API_TEST
          VALUE=$(docker compose exec -T postgres psql -U new_api_test -d new_api_test -tA -c "select value from ops_restore_marker where id = 1;")
          test "$VALUE" = "before-restore"

      - name: Verify login after restore
        working-directory: infra/new-api
        run: |
          curl -fsS http://127.0.0.1:3000/api/user/login \
            -H "Content-Type: application/json" \
            --data-raw '{"username":"testroot","password":"'"$ADMIN_PASSWORD"'"}' \
            > login-after-restore.json
          grep -q '"success":true' login-after-restore.json

      - name: Reject bad backup
        working-directory: infra/new-api
        run: |
          mkdir -p backups/bad-backup
          if scripts/restore --backup backups/bad-backup --confirm RESTORE_NEW_API_TEST; then
            echo "bad backup was accepted" >&2
            exit 1
          fi

      - name: Redact logs
        working-directory: infra/new-api
        run: |
          cat > sample.log <<'LOG'
          Authorization: Bearer sk-testsecret
          Cookie: session=abc
          PASSWORD=secret
          LOG
          scripts/redact-logs --input sample.log --output sample.redacted.log
          grep -q "REDACTED" sample.redacted.log
          ! grep -q "sk-testsecret" sample.redacted.log

      - name: Stop stack
        if: always()
        working-directory: infra/new-api
        run: docker compose down --remove-orphans
